<head>

<title>Invoicee — Editor faktury</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  font-size: 16px;
  color: var(--ink);
  background: var(--canvas-parchment);
  line-height: 1.47;
  letter-spacing: -0.2px;
}
:root {
  --primary: #1A7F4B;
  --primary-hover: #167A44;
  --primary-on-dark: #3DDC6E;
  --primary-light: #E8F5ED;
  --primary-15: rgba(26,127,75,0.12);
  --canvas: #ffffff;
  --canvas-parchment: #f0f0f3;
  --ink: #1d1d1f;
  --ink-on-dark: #ffffff;
  --ink-muted: #6e6e73;
  --ink-muted-48: #9b9ba1;
  --hairline: #d2d2d7;
  --divider-soft: #e8e8ed;
  --radius-pill: 9999px;
  --ease-lift: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-out-soft: cubic-bezier(0.16, 1, 0.3, 1);
}
body.dark-mode {
  --canvas: #1c1c1e;
  --canvas-parchment: #0c0c0d;
  --ink: #f5f5f7;
  --ink-muted: #a1a1a6;
  --ink-muted-48: #6e6e73;
  --hairline: #38383a;
  --divider-soft: #2c2c2e;
  --primary-light: rgba(26,127,75,0.20);
}
#root { min-height: 100vh; }
input, select, textarea, button { font-family: inherit; font-size: inherit; }
a { color: var(--primary); text-decoration: none; }
::selection { background: var(--primary-15); }

/* ── App bar ── */
.ed-root { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.ed-bar {
  position: sticky; top: 0; z-index: 50;
  height: 60px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
  padding: 0 22px; gap: 16px;
  background: color-mix(in srgb, var(--canvas) 82%, transparent);
  backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--divider-soft);
}
.ed-brand { display: flex; align-items: center; gap: 9px; justify-self: start; }
.ed-bar-mid { display: flex; align-items: center; gap: 12px; justify-self: center; }
.ed-saved { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-muted); font-weight: 500; }
.ed-bar > div:last-child { justify-self: end; }
.ed-ghost-btn {
  display: inline-flex; align-items: center; gap: 6px; height: 38px; padding: 0 15px;
  border-radius: 999px; border: 1px solid var(--hairline); background: var(--canvas);
  color: var(--ink); font-size: 14px; font-weight: 500; cursor: pointer;
  transition: border-color .18s ease, background .18s ease;
}
.ed-ghost-btn:hover { border-color: var(--ink-muted-48); }
.ed-primary-btn {
  display: inline-flex; align-items: center; gap: 7px; height: 38px; padding: 0 18px;
  border-radius: 999px; border: none; background: var(--primary); color: #fff;
  font-size: 14px; font-weight: 500; cursor: pointer;
  box-shadow: 0 1px 2px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.22);
  transition: box-shadow .4s var(--ease-lift), transform .15s ease;
}
.ed-primary-btn:hover { box-shadow: 0 8px 22px -6px var(--primary-15), 0 3px 10px rgba(0,0,0,0.16); }
.ed-primary-btn:active { transform: scale(0.97); }

/* ── Workspace: flex sidebar + preview, no page scroll ── */
.ed-work {
  flex: 1; min-height: 0; display: flex;
}
/* Left = sidebar; scrolls internally */
.ed-form {
  display: flex; flex-direction: column; gap: 18px; min-width: 0;
  overflow-y: auto; padding: 24px 22px 40px;
  background: var(--canvas);
  flex-shrink: 0;
}
.ed-two { display: grid; grid-template-columns: 1fr; gap: 18px; }

/* Drag handle between sidebar and preview */
.ed-drag {
  width: 5px; flex-shrink: 0; cursor: col-resize; position: relative; z-index: 10;
  background: var(--divider-soft);
  display: flex; align-items: center; justify-content: center;
  transition: background .18s ease;
  user-select: none;
}
.ed-drag:hover { background: color-mix(in srgb, var(--primary) 35%, var(--divider-soft)); }
.ed-drag.dragging { background: var(--primary); }
.ed-drag-pip {
  width: 3px; height: 26px; border-radius: 2px;
  background: var(--hairline); pointer-events: none;
  transition: background .18s ease;
}
.ed-drag:hover .ed-drag-pip { background: color-mix(in srgb, var(--primary) 70%, white); }
.ed-drag.dragging .ed-drag-pip { background: rgba(255,255,255,0.85); }

/* ── Preview area: scale-to-fit, NO scroll ── */
.ed-preview {
  flex: 1; min-width: 0; min-height: 0; overflow: hidden; display: flex; flex-direction: column;
  background: var(--canvas-parchment);
}
.a4-scroll { overflow: hidden; flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
.a4 {
  background: #fff; border-radius: 8px; padding: 36px 34px;
  display: flex; flex-direction: column; flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.07), 0 24px 60px -20px rgba(0,0,0,0.22), 0 0 0 0.5px rgba(0,0,0,0.04);
  color: #1d1d1f; overflow: hidden;
}

/* ── Buttons reveal on row hover ── */
.ed-del:hover { background: color-mix(in srgb, #ff5f57 12%, transparent) !important; color: #d23b32 !important; }
.gg-add:hover {
  background: color-mix(in srgb, var(--primary) 13%, transparent) !important;
  border-color: var(--primary) !important;
  box-shadow: 0 4px 14px -6px color-mix(in srgb, var(--primary) 50%, transparent) !important;
}

/* ── CTA sheen ── */
.sheen { position: relative; overflow: hidden; isolation: isolate; }
.sheen::after {
  content: ''; position: absolute; top: 0; bottom: 0; left: -60%; width: 45%; z-index: 1;
  background: linear-gradient(100deg, transparent, rgba(255,255,255,0.45), transparent);
  transform: skewX(-18deg); pointer-events: none; opacity: 0;
}
.sheen:hover::after { animation: sheenSweep 0.85s var(--ease-out-soft); }
@keyframes sheenSweep { 0% { left: -60%; opacity: 0; } 12% { opacity: 1; } 100% { left: 130%; opacity: 0; } }

/* ── Glassmorphism mode ── */
body.glassy .glass-nav {
  background: color-mix(in srgb, var(--canvas) 58%, transparent) !important;
  backdrop-filter: saturate(180%) blur(22px) !important; -webkit-backdrop-filter: saturate(180%) blur(22px) !important;
}

/* ── Scrollbars ── */
* { scrollbar-width: thin; scrollbar-color: var(--hairline) transparent; }
::-webkit-scrollbar { width: 11px; height: 11px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 999px; border: 3px solid transparent; background-clip: content-box; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-muted-48); background-clip: content-box; }

/* ── Responsive: stack on narrow screens ── */
@media (max-width: 920px) {
  .ed-root { height: auto; overflow: visible; }
  .ed-work { flex-direction: column; }
  .ed-drag { display: none; }
  .ed-form { width: 100% !important; flex-shrink: 1; overflow: visible; border-bottom: 1px solid var(--divider-soft); }
  .ed-preview { overflow: visible; min-height: 600px; }
  .a4-scroll { overflow: visible; padding: 32px; }
  .ed-bar { grid-template-columns: auto 1fr; }
  .ed-bar-mid { display: none; }
}

/* ── Print: only the A4 ── */
@media print {
  @page { margin: 0; size: A4; }
  body { background: #fff; }
  .ed-bar, .ed-form, #omelette-tweaks-root, .ed-tweaks { display: none !important; }
  .ed-work { display: block; padding: 0; max-width: none; }
  .ed-preview { border: none; box-shadow: none; border-radius: 0; }
  .a4-scroll { padding: 0; overflow: visible; background: #fff; display: block; }
  .a4 { width: 560px !important; height: auto !important; transform: none !important; box-shadow: none; border-radius: 0; min-height: 100vh; }
}

@media (prefers-reduced-motion: reduce) {
  .sheen::after { display: none; }
}
</style>
<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
